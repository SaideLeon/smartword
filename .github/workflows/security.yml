name: Security Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  adversarial:
    name: Adversarial Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run adversarial tests
        run: npm run test:adversarial
        env:
          APP_URL: ${{ secrets.ADVERSARIAL_APP_URL }}
          ADVERSARIAL_COOKIE: ${{ secrets.ADVERSARIAL_COOKIE }}

      - name: Run security unit tests
        run: npm run test:security
